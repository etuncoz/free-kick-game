name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # match the npm major that generates package-lock.json locally
          # (npm 10 vs 11 disagree about wasm/optional-dep lock entries)
          node-version: 24
          cache: npm
      # not `npm ci`: the wasm32-wasi fallback packages (rolldown /
      # tailwind oxide) trip npm ci's lock validation when the lock was
      # generated on another platform (npm/cli#7902-class bug). npm install
      # still resolves from the committed lock.
      - run: npm install --no-audit --no-fund
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
